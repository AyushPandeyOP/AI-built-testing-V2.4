<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Chat Interface</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .chat-container { width: 600px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .messages { height: 400px; overflow-y: scroll; border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
        .input-area { display: flex; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .input-area button { padding: 10px; border: none; border-radius: 5px; background-color: #28a745; color: white; cursor: pointer; }
        .input-area button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Universal AI Chat Interface</h2>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value;
            const messagesContainer = document.getElementById('messages');
            if (message) {
                messagesContainer.innerHTML += `<div>${message}</div>`;
                inputField.value = '';
                // Simulate AI response
                setTimeout(() => {
                    messagesContainer.innerHTML += `<div><strong>AI:</strong> Response to "${message}"</div>`;
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 1000);
            }
        }
    </script>
</body>
</html>
