<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayush AI - Premium Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #f8fafc;
        }
        .dark {
            --bg: #020617;
            --sidebar: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            overscroll-behavior-y: contain;
        }

        .app-container { height: 100dvh; display: flex; overflow: hidden; }

        /* Smooth Scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Markdown Styling */
        .markdown-content p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-content code { background: rgba(0,0,0,0.05); padding: 0.2rem 0.4rem; border-radius: 6px; font-family: monospace; }
        .dark .markdown-content code { background: rgba(255,255,255,0.1); }
        .markdown-content pre { background: #0f172a; color: #f8fafc; padding: 1.25rem; border-radius: 12px; overflow-x: auto; margin: 1rem 0; border: 1px solid #334155; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }

        .message-user { background: #2563eb; color: white; border-radius: 18px 18px 2px 18px; }
        .message-ai { background: #f1f5f9; color: #1e293b; border-radius: 18px 18px 18px 2px; }
        .dark .message-ai { background: #1e293b; color: #f1f5f9; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100">

    <div class="app-container">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">A</div>
                    <span class="font-bold text-xl tracking-tight">Ayush AI</span>
                </div>
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-xl transition shadow-lg shadow-blue-500/20 font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    New Chat
                </button>
            </div>
            
            <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar"></div>

            <div class="p-4 mx-4 mb-4 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">About</p>
                <p class="text-xs font-semibold text-slate-600 dark:text-slate-300">Design & Developed By <span class="text-blue-500">Ayush Pandey JI</span></p>
            </div>

            <div class="p-4 border-t border-slate-200 dark:border-slate-800 flex gap-2">
                <button onclick="openSettings()" class="flex-1 flex items-center justify-center p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button onclick="toggleDarkMode()" class="flex-1 flex items-center justify-center p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-800 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v1"/><path d="M12 20v1"/><path d="M3 12h1"/><path d="M20 12h1"/></svg>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0 bg-white dark:bg-slate-950">
            <header class="h-16 flex items-center justify-between px-6 border-b border-slate-100 dark:border-slate-800 glass sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div>
                        <h2 id="currentChatTitle" class="font-bold text-slate-800 dark:text-white truncate max-w-[200px]">New Conversation</h2>
                        <div id="modelBadge" class="text-[10px] text-blue-500 font-bold uppercase tracking-wider">DeepSeek R1</div>
                    </div>
                </div>
            </header>

            <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 no-scrollbar">
                <div id="welcomeScreen" class="max-w-2xl mx-auto mt-20 text-center space-y-6">
                    <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto">
                        <svg class="text-blue-600" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Welcome to Ayush AI</h1>
                    <p class="text-slate-500 dark:text-slate-400">Ask me anything about coding, life, or technology.</p>
                </div>
            </div>

            <div class="p-4 md:p-6 bg-white dark:bg-slate-950">
                <div class="max-w-4xl mx-auto relative">
                    <div class="relative flex items-end gap-3 bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-3 pl-5 shadow-sm focus-within:ring-2 ring-blue-500/20 transition-all">
                        <textarea id="userInput" rows="1" placeholder="Type a message..." class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-2 text-slate-800 dark:text-slate-100" oninput="autoResize(this)"></textarea>
                        <button id="sendBtn" onclick="handleSend()" class="p-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition transform active:scale-95 disabled:opacity-50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 scale-up-center">
            <h3 class="text-2xl font-bold">Model Configuration</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">Model Name</label>
                    <input type="text" id="modelInput" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-4 py-3 focus:ring-2 ring-blue-500 outline-none" placeholder="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wide">System Prompt</label>
                    <textarea id="systemPromptInput" rows="3" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-4 py-3 focus:ring-2 ring-blue-500 outline-none resize-none"></textarea>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button onclick="closeSettings()" class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 font-bold hover:bg-slate-200 transition">Cancel</button>
                <button onclick="saveSettings()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management with Hardcoded API ---
        let state = {
            chats: [],
            currentChatId: null,
            settings: {
                apiKey: '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',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are an AI assistant designed by Ayush Pandey JI. You are helpful and creative.',
                isDarkMode: false
            }
        };

        // --- Core Functions ---
        window.onload = () => {
            const saved = localStorage.getItem('ayush_ai_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                // Keep the hardcoded API key even if old data exists
                state = { ...state, ...parsed, settings: { ...parsed.settings, apiKey: state.settings.apiKey } };
            }
            if (state.settings.isDarkMode) document.documentElement.classList.add('dark');
            if (state.chats.length === 0) createNewChat();
            else { renderSidebar(); loadChat(state.currentChatId || state.chats[0].id); }
        };

        function saveState() { localStorage.setItem('ayush_ai_state', JSON.stringify(state)); }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function createNewChat() {
            const id = Date.now().toString();
            state.chats.unshift({ id, title: 'New Conversation', messages: [] });
            state.currentChatId = id;
            saveState();
            renderSidebar();
            loadChat(id);
        }

        function renderSidebar() {
            const container = document.getElementById('chatHistory');
            container.innerHTML = state.chats.map(chat => `
                <div class="group flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition ${state.currentChatId === chat.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-200 dark:hover:bg-slate-800'}">
                    <span class="flex-1 truncate text-sm font-medium" onclick="loadChat('${chat.id}')">${chat.title}</span>
                    <button onclick="deleteChat('${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/></svg></button>
                </div>
            `).join('');
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('currentChatTitle').innerText = chat.title;
            document.getElementById('modelBadge').innerText = state.settings.model.split('/').pop();
            renderMessages();
            renderSidebar();
            saveState();
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.chats.length === 0) createNewChat();
            else loadChat(state.chats[0].id);
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            const chat = state.chats.find(c => c.id === state.currentChatId);
            
            if (chat.messages.length === 0) {
                document.getElementById('welcomeScreen').classList.remove('hidden');
                container.innerHTML = '';
                container.appendChild(document.getElementById('welcomeScreen'));
                return;
            }
            
            document.getElementById('welcomeScreen').classList.add('hidden');
            container.innerHTML = chat.messages.map(m => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-slide-up">
                    <div class="max-w-[85%] px-5 py-3 shadow-sm ${m.role === 'user' ? 'message-user' : 'message-ai shadow-md'}">
                        <div class="markdown-content text-sm">${marked.parse(m.content)}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTo(0, container.scrollHeight);
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const content = input.value.trim();
            if (!content) return;

            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (chat.messages.length === 0) chat.title = content.substring(0, 30) + '...';
            
            chat.messages.push({ role: 'user', content });
            input.value = '';
            autoResize(input);
            renderMessages();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.settings.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: [{ role: 'system', content: state.settings.systemPrompt }, ...chat.messages]
                    })
                });
                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                chat.messages.push({ role: 'assistant', content: aiMsg });
                renderMessages();
                saveState();
            } catch (e) {
                alert("Error connecting to AI. Please check your connection.");
            }
        }

        // --- Settings ---
        function openSettings() {
            document.getElementById('modelInput').value = state.settings.model;
            document.getElementById('systemPromptInput').value = state.settings.systemPrompt;
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        function saveSettings() {
            state.settings.model = document.getElementById('modelInput').value;
            state.settings.systemPrompt = document.getElementById('systemPromptInput').value;
            saveState();
            closeSettings();
            loadChat(state.currentChatId);
        }

        function toggleDarkMode() {
            state.settings.isDarkMode = !state.settings.isDarkMode;
            document.documentElement.classList.toggle('dark');
            saveState();
        }
    </script>
</body>
</html>
