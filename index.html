<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fff;
            color: #333;
            transition: 0.3s;
        }
        
        body.dark {
            background: #1a1a1a;
            color: #fff;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #f5f5f5;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 20px;
        }
        
        body.dark .sidebar {
            background: #111;
            border-right-color: #333;
        }
        
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 15px;
        }
        
        .chat-item {
            padding: 12px;
            background: #e8e8e8;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        
        body.dark .chat-item {
            background: #2a2a2a;
        }
        
        .chat-item:hover {
            background: #d0d0d0;
        }
        
        body.dark .chat-item:hover {
            background: #3a3a3a;
        }
        
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        
        .new-chat-btn:hover {
            background: #0d8968;
        }
        
        /* Main chat area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        body.dark .header {
            border-bottom-color: #333;
        }
        
        .header h1 {
            font-size: 20px;
        }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        body.dark .btn {
            background: #2a2a2a;
            border-color: #444;
        }
        
        .btn:hover {
            background: #e0e0e0;
        }
        
        body.dark .btn:hover {
            background: #3a3a3a;
        }
        
        /* Chat messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
        }
        
        .message.assistant .message-content {
            background: #f0f0f0;
        }
        
        body.dark .message.assistant .message-content {
            background: #2a2a2a;
        }
        
        .message.user .message-content {
            background: #10a37f;
            color: white;
        }
        
        /* Input area */
        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
        }
        
        body.dark .input-area {
            border-top-color: #333;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 16px;
            resize: none;
            max-height: 100px;
        }
        
        body.dark #userInput {
            background: #2a2a2a;
            color: white;
            border-color: #444;
        }
        
        #sendBtn {
            padding: 12px 20px;
            background: #10a37f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        #sendBtn:hover {
            background: #0d8968;
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        body.dark .modal-content {
            background: #1a1a1a;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 14px;
        }
        
        body.dark .form-group input,
        body.dark .form-group select {
            background: #2a2a2a;
            color: white;
            border-color: #444;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .modal-buttons .save-btn {
            background: #10a37f;
            color: white;
        }
        
        .modal-buttons .save-btn:hover {
            background: #0d8968;
        }
        
        .modal-buttons .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }
        
        body.dark .modal-buttons .cancel-btn {
            background: #3a3a3a;
            color: white;
        }
        
        .modal-buttons .cancel-btn:hover {
            background: #d0d0d0;
        }
        
        body.dark .modal-buttons .cancel-btn:hover {
            background: #4a4a4a;
        }
        
        /* Footer */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #ddd;
        }
        
        body.dark footer {
            border-top-color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
            <h3>Chat History</h3>
            <div id="chatHistory"></div>
        </div>
        
        <!-- Main Area -->
        <div class="main">
            <div class="header">
                <h1>ChatGPT</h1>
                <div class="header-buttons">
                    <button class="btn" id="settingsBtn">⚙️ Settings</button>
                    <button class="btn" id="darkModeBtn">🌙 Dark Mode</button>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Send a message..." rows="1"></textarea>
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>Settings</h2>
            
            <div class="form-group">
                <label for="apiKeyInput">API Key:</label>
                <input type="password" id="apiKeyInput" placeholder="sk-or-v1-...">
            </div>
            
            <div class="form-group">
                <label for="modelSelect">AI Model:</label>
                <select id="modelSelect">
                    <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
                    <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="openai/gpt-4">GPT-4</option>
                    <option value="meta-llama/llama-2-70b-chat">Llama 2 70B</option>
                    <option value="mistralai/mistral-7b-instruct">Mistral 7B</option>
                </select>
            </div>
            
            <div class="modal-buttons">
                <button class="save-btn" id="saveSettingsBtn">Save</button>
                <button class="cancel-btn" id="closeSettingsBtn">Cancel</button>
            </div>
        </div>
    </div>
    
    <footer>
        <p>Design & Developed By Ayush Pandey JI ✨</p>
    </footer>

    <script>
        // Configuration
        const CONFIG = {
            API_KEY: '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',
            API_URL: 'https://openrouter.ai/api/v1/chat/completions',
            DEFAULT_MODEL: 'deepseek/deepseek-r1:free'
        };

        // State
        let state = {
            apiKey: CONFIG.API_KEY,
            model: CONFIG.DEFAULT_MODEL,
            chats: {},
            currentChatId: null,
            darkMode: localStorage.getItem('darkMode') === 'true'
        };

        // Initialize
        function init() {
            loadFromStorage();
            applyDarkMode();
            setupEventListeners();
            createNewChat();
        }

        // Storage
        function loadFromStorage() {
            const saved = localStorage.getItem('chatState');
            if (saved) {
                const data = JSON.parse(saved);
                state = { ...state, ...data };
            }
        }

        function saveToStorage() {
            localStorage.setItem('chatState', JSON.stringify(state));
        }

        // Chat Management
        function createNewChat() {
            const chatId = Date.now().toString();
            state.chats[chatId] = {
                id: chatId,
                title: 'New Chat',
                messages: [],
                createdAt: new Date().toISOString()
            };
            state.currentChatId = chatId;
            saveToStorage();
            renderChatHistory();
            clearMessages();
        }

        function renderChatHistory() {
            const historyDiv = document.getElementById('chatHistory');
            historyDiv.innerHTML = '';
            
            Object.values(state.chats).forEach(chat => {
                const chatEl = document.createElement('div');
                chatEl.className = 'chat-item';
                chatEl.textContent = chat.title;
                chatEl.onclick = () => {
                    state.currentChatId = chat.id;
                    saveToStorage();
                    renderChatHistory();
                    renderMessages();
                };
                historyDiv.appendChild(chatEl);
            });
        }

        // Messages
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        function renderMessages() {
            const chat = state.chats[state.currentChatId];
            const messagesDiv = document.getElementById('messages');
            
            if (!chat || !chat.messages.length) {
                messagesDiv.innerHTML = '<div style="text-align: center; color: #999;">Start a conversation</div>';
                return;
            }

            messagesDiv.innerHTML = '';
            chat.messages.forEach(msg => {
                const msgEl = document.createElement('div');
                msgEl.className = `message ${msg.role}`;
                msgEl.innerHTML = `<div class="message-content">${escapeHtml(msg.content)}</div>`;
                messagesDiv.appendChild(msgEl);
            });

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addMessage(role, content) {
            const chat = state.chats[state.currentChatId];
            if (!chat) return;

            chat.messages.push({ role, content });
            
            if (role === 'user' && chat.messages.length === 1) {
                chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
            }

            saveToStorage();
            renderMessages();
        }

        // API Call
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            addMessage('user', message);
            input.value = '';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                addMessage('assistant', '⏳ Thinking...');

                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: state.chats[state.currentChatId].messages.map(msg => ({
                            role: msg.role,
                            content: msg.content
                        })),
                        stream: false
                    })
                });

                const data = await response.json();

                if (data.choices && data.choices[0]) {
                    const lastMsg = state.chats[state.currentChatId].messages.pop();
                    addMessage('assistant', data.choices[0].message.content);
                }
            } catch (error) {
                addMessage('assistant', `❌ Error: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                document.getElementById('userInput').focus();
            }
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('newChatBtn').addEventListener('click', createNewChat);
            
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            
            document.getElementById('userInput').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            document.getElementById('settingsBtn').addEventListener('click', () => {
                document.getElementById('settingsModal').classList.add('active');
                document.getElementById('apiKeyInput').value = state.apiKey;
                document.getElementById('modelSelect').value = state.model;
            });

            document.getElementById('closeSettingsBtn').addEventListener('click', () => {
                document.getElementById('settingsModal').classList.remove('active');
            });

            document.getElementById('saveSettingsBtn').addEventListener('click', () => {
                state.apiKey = document.getElementById('apiKeyInput').value;
                state.model = document.getElementById('modelSelect').value;
                saveToStorage();
                document.getElementById('settingsModal').classList.remove('active');
            });

            document.getElementById('darkModeBtn').addEventListener('click', () => {
                state.darkMode = !state.darkMode;
                localStorage.setItem('darkMode', state.darkMode);
                applyDarkMode();
            });

            document.getElementById('settingsModal').addEventListener('click', e => {
                if (e.target.id === 'settingsModal') {
                    document.getElementById('settingsModal').classList.remove('active');
                }
            });
        }

        function applyDarkMode() {
            if (state.darkMode) {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start
        init();
    </script>
</body>
</html>
