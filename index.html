<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Subway Surfer Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: Arial, sans-serif; }
        canvas { display: block; background: linear-gradient(#87CEEB, #f4a460); }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px; text-shadow: 2px 2px 4px #000;
        }
        #msg {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center; display: none;
        }
        button { padding: 10px 20px; font-size: 20px; cursor: pointer; background: #ffcc00; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="msg">
        <h1>GAME OVER!</h1>
        <button onclick="resetGame()">Play Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const msgEl = document.getElementById('msg');

        // Game Settings
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let speed = 5;
        let obstacles = [];
        const lanes = [canvas.width / 4, canvas.width / 2, (canvas.width / 4) * 3];

        // Player Object
        const player = {
            lane: 1, // Start in middle lane
            x: lanes[1],
            y: canvas.height - 100,
            width: 50,
            height: 80,
            targetX: lanes[1],
            dy: 0,
            jumpPower: -15,
            gravity: 0.8,
            isJumping: false
        };

        // Controls
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
            if (e.key === ' ' && !player.isJumping) {
                player.dy = player.jumpPower;
                player.isJumping = true;
            }
            player.targetX = lanes[player.lane];
        });

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            obstacles.push({
                x: lanes[lane] - 30,
                y: -100,
                width: 60,
                height: 100,
                color: '#ff4444'
            });
        }

        function update() {
            if (!gameActive) return;

            // Player lateral movement smooth transition
            player.x += (player.targetX - player.x) * 0.2;

            // Jump physics
            player.y += player.dy;
            if (player.y < canvas.height - 100) {
                player.dy += player.gravity;
            } else {
                player.y = canvas.height - 100;
                player.dy = 0;
                player.isJumping = false;
            }

            // Obstacles logic
            obstacles.forEach((obs, index) => {
                obs.y += speed;

                // Collision Detection
                if (
                    player.x - player.width/2 < obs.x + obs.width &&
                    player.x + player.width/2 > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    gameOver();
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(index, 1);
                    score++;
                    scoreEl.innerText = score;
                    if (score % 10 === 0) speed += 0.5; // Increase difficulty
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Road/Lanes
            ctx.fillStyle = '#555';
            ctx.fillRect(canvas.width/4 - 60, 0, canvas.width/2 + 120, canvas.height);

            // Draw Player
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x - player.width/2, player.y, player.width, player.height);

            // Draw Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "black";
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function gameOver() {
            gameActive = false;
            msgEl.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            speed = 5;
            obstacles = [];
            player.lane = 1;
            player.targetX = lanes[1];
            gameActive = true;
            msgEl.style.display = 'none';
            scoreEl.innerText = score;
        }

        setInterval(spawnObstacle, 1500);
        draw();
    </script>
</body>
</html>
