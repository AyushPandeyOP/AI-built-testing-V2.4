<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.0/dist/tailwind.min.css" rel="stylesheet">
    <title>Universal AI Chat Interface</title>
</head>
<body class="bg-gray-900 text-white">
    <header class="p-4">
        <h1 class="text-2xl font-bold">AI Chat Interface</h1>
        <div class="flex justify-end space-x-4">
            <button id="settingsButton" class="bg-blue-500 px-4 py-2 rounded">Settings</button>
            <button id="darkModeToggle" class="bg-gray-600 px-4 py-2 rounded">Toggle Dark Mode</button>
        </div>
    </header>
    <main class="container mx-auto my-4">
        <aside class="w-1/4 float-left">
            <h2 class="font-semibold">Chat History</h2>
            <ul id="chatHistory" class="list-disc pl-5"></ul>
        </aside>
        <section class="w-3/4 float-right">
            <div id="chatContainer" class="border border-gray-700 p-4 rounded">
                <div id="messages" class="overflow-y-auto h-64"></div>
                <input type="text" id="userInput" class="w-full border-gray-500 border p-2 rounded" placeholder="Type your message..." />
                <button id="sendMessage" class="bg-green-500 px-4 py-2 rounded">Send</button>
            </div>
        </section>
        <div class="clear-both"></div>
    </main>
    <footer class="p-4">
        <p class="text-center">Design & Developed By Ayush Pandey JI</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const apiKey = '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';
        const chatHistory = [];

        document.getElementById('sendMessage').onclick = async function() {
            const input = document.getElementById('userInput');
            const message = input.value;
            chatHistory.push(message);
            document.getElementById('chatHistory').innerHTML += `<li>${message}</li>`;
            input.value = '';

            const response = await fetch('https://api.openrouter.ai/v1/chat', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: 'deepseek/deepseek-r1:free', prompt: message })
            });
            const data = await response.json();
            const botMessage = data.response;
            document.getElementById('messages').innerHTML += `<div>${botMessage}</div>`;
        };

        document.getElementById('darkModeToggle').onclick = () => {
            document.body.classList.toggle('bg-gray-900');
            document.body.classList.toggle('bg-white');
            document.body.classList.toggle('text-white');
            document.body.classList.toggle('text-black');
        };
    </script>
</body>
</html>
