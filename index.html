<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Architect | Ayush Pandey Ji</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: {
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-in forwards',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        .app-container { height: 100dvh; display: flex; flex-direction: row; }
        
        /* Smooth Scroll */
        #messagesContainer { scroll-behavior: smooth; }
        #messagesContainer::-webkit-scrollbar { width: 4px; }
        #messagesContainer::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        /* Loader Animation */
        #loading { position: fixed; inset: 0; background: #ffffff; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dark #loading { background: #020617; }
        
        .loader-ring { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bubble Style */
        .msg-bubble { max-width: 85%; border-radius: 20px; padding: 14px 18px; position: relative; line-height: 1.6; }
        .markdown-content pre { background: #111827; color: white; padding: 12px; border-radius: 10px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
        .markdown-content code { background: rgba(59, 130, 246, 0.1); padding: 2px 4px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">

    <div id="loading">
        <div class="loader-ring"></div>
        <p class="mt-4 font-bold text-slate-500 tracking-widest animate-pulse">AYUSH AI INITIALIZING...</p>
    </div>

    <div class="app-container">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl lg:shadow-none">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="p-2 bg-blue-600 rounded-xl text-white shadow-lg shadow-blue-500/30">
                        <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                    </div>
                    <span class="text-xl font-black tracking-tighter">ARCHITECT</span>
                </div>
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-slate-900 dark:bg-blue-600 hover:scale-[1.02] text-white py-3.5 px-4 rounded-2xl font-bold transition-all shadow-xl">
                    <i data-lucide="plus" class="w-5 h-5"></i> New Chat
                </button>
            </div>
            
            <div id="chatHistory" class="flex-1 overflow-y-auto px-4 space-y-2"></div>

            <div class="p-6 border-t border-gray-100 dark:border-slate-800">
                <div class="flex items-center gap-3 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-2xl mb-4">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">AP</div>
                    <div>
                        <p class="text-[10px] font-bold text-blue-600 uppercase">Engineer</p>
                        <p class="text-xs font-bold truncate">Ayush Pandey Ji</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="openSettings()" class="flex-1 p-3 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-xl transition"><i data-lucide="settings" class="w-5 h-5"></i></button>
                    <button onclick="toggleDarkMode()" class="flex-1 p-3 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-xl transition"><i data-lucide="moon" class="w-5 h-5"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0 bg-white dark:bg-slate-950">
            <header class="h-16 flex items-center justify-between px-6 border-b border-gray-100 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl z-20">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg"><i data-lucide="menu"></i></button>
                    <h2 id="currentChatTitle" class="font-bold text-sm truncate max-w-[150px] md:max-w-xs">Chat Session</h2>
                </div>
                <div id="typingIndicator" class="hidden flex items-center gap-2 text-blue-500 font-bold text-[10px] uppercase tracking-widest bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-full">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    AI THINKING
                </div>
            </header>

            <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                <div id="welcomeView" class="max-w-2xl mx-auto text-center py-24 animate-fade-in">
                    <div class="inline-flex p-5 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-3xl text-white shadow-2xl mb-8">
                        <i data-lucide="sparkles" class="w-10 h-10"></i>
                    </div>
                    <h1 class="text-4xl font-black mb-4 tracking-tight">Swagat hai, Ayush!</h1>
                    <p class="text-slate-400 text-lg">Main ek powerful AI hoon. Kya help chahiye?</p>
                </div>
            </div>

            <div class="p-4 md:p-8 bg-gradient-to-t from-white dark:from-slate-950 via-white dark:via-slate-950 to-transparent">
                <div class="max-w-4xl mx-auto">
                    <div id="imagePreview" class="hidden flex items-center gap-3 p-3 bg-gray-50 dark:bg-slate-900 rounded-2xl border border-blue-200 dark:border-blue-900 w-fit mb-4 animate-slide-up shadow-sm relative">
                        <img id="previewImg" src="" class="w-14 h-14 object-cover rounded-xl shadow-md">
                        <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg hover:scale-110 transition"><i data-lucide="x" class="w-3 h-3"></i></button>
                    </div>

                    <div class="relative flex items-end gap-2 bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-3xl p-2.5 pl-5 shadow-2xl focus-within:border-blue-500 transition-all duration-300">
                        <label class="p-2.5 cursor-pointer text-slate-400 hover:text-blue-500 transition-colors">
                            <i data-lucide="camera" class="w-6 h-6"></i>
                            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                        </label>
                        
                        <textarea id="userInput" rows="1" placeholder="Puchiye kuch bhi..." 
                            class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-3 text-slate-700 dark:text-slate-200" 
                            oninput="autoResize(this)"></textarea>

                        <button id="sendBtn" onclick="handleSend()" class="p-3 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-500/40 hover:scale-105 active:scale-95 transition-all">
                            <i data-lucide="send-horizontal" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
            <h3 class="text-2xl font-black mb-6 flex items-center gap-3">
                <i data-lucide="sliders" class="text-blue-600"></i> Settings
            </h3>
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">OpenRouter API Key</label>
                    <input type="password" id="apiKey" class="w-full bg-gray-50 dark:bg-slate-800 border-none rounded-2xl px-5 py-4 focus:ring-2 ring-blue-500 outline-none transition-all shadow-inner" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">AI Model</label>
                    <input type="text" id="modelName" placeholder="google/gemini-2.0-flash-001" class="w-full bg-gray-50 dark:bg-slate-800 border-none rounded-2xl px-5 py-4 focus:ring-2 ring-blue-500 outline-none transition-all shadow-inner">
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeSettings()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition">Cancel</button>
                <button onclick="saveSettings()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-xl shadow-blue-500/20">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Reliability Fix: Hide loader after 3s even if scripts fail
        setTimeout(() => {
            const loader = document.getElementById('loading');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        }, 3000);

        let state = {
            chats: [],
            currentId: null,
            imageStore: null,
            settings: { apiKey: '', model: 'google/gemini-2.0-flash-001', dark: false }
        };

        const synth = window.speechSynthesis;

        window.onload = () => {
            const saved = localStorage.getItem('ayush_beast_v2');
            if (saved) state = JSON.parse(saved);
            
            if (state.settings.dark) document.documentElement.classList.add('dark');
            if (state.chats.length === 0) createNewChat();
            else { renderSidebar(); loadChat(state.currentId || state.chats[0].id); }
            
            lucide.createIcons();
            // Hide loader properly
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
        };

        function persist() { localStorage.setItem('ayush_beast_v2', JSON.stringify(state)); }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function createNewChat() {
            const id = Date.now().toString();
            state.chats.unshift({ id, title: 'New Conversation', messages: [] });
            state.currentId = id;
            persist(); renderSidebar(); loadChat(id);
        }

        function loadChat(id) {
            state.currentId = id;
            const chat = state.chats.find(c => c.id === id);
            document.getElementById('currentChatTitle').innerText = chat.title;
            renderMessages();
            renderSidebar();
        }

        function previewImage(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.imageStore = e.target.result;
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('imagePreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            state.imageStore = null;
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('fileInput').value = '';
        }

        function autoResize(t) {
            t.style.height = 'auto';
            t.style.height = t.scrollHeight + 'px';
        }

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            synth.speak(utterance);
        }

        async function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text && !state.imageStore) return;

            if (!state.settings.apiKey) {
                alert("Bhai API Key daalo pahle!");
                openSettings();
                return;
            }

            const chat = state.chats.find(c => c.id === state.currentId);
            chat.messages.push({ role: 'user', content: text, image: state.imageStore });
            if (chat.messages.length === 1) chat.title = text.substring(0, 20) || "Image Session";
            
            input.value = ''; clearImage(); autoResize(input);
            renderMessages();

            const typing = document.getElementById('typingIndicator');
            typing.classList.remove('hidden');
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${state.settings.apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: state.settings.model,
                        messages: chat.messages.map(m => {
                            if (m.image) return { role: m.role, content: [{ type: "text", text: m.content || "Analyze this" }, { type: "image_url", image_url: { url: m.image } }] };
                            return { role: m.role, content: m.content };
                        })
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                chat.messages.push({ role: 'assistant', content: aiText });
            } catch (e) {
                chat.messages.push({ role: 'assistant', content: "Error: API error aa rahi hai. Check settings!" });
            } finally {
                typing.classList.add('hidden');
                btn.disabled = false;
                renderMessages();
                persist();
            }
        }

        function renderMessages() {
            const chat = state.chats.find(c => c.id === state.currentId);
            const container = document.getElementById('messagesContainer');
            const welcome = document.getElementById('welcomeView');
            
            welcome.style.display = chat.messages.length > 0 ? 'none' : 'block';

            container.innerHTML = chat.messages.map((m, i) => `
                <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-slide-up">
                    <div class="msg-bubble ${m.role === 'user' ? 'bg-blue-600 text-white shadow-xl' : 'bg-gray-100 dark:bg-slate-900 border dark:border-slate-800'}">
                        ${m.image ? `<img src="${m.image}" class="w-full rounded-xl mb-3 shadow-md border-2 border-white/20">` : ''}
                        <div class="markdown-content text-sm md:text-base">
                            ${marked.parse(m.content || '')}
                        </div>
                        ${m.role === 'assistant' ? `
                            <button onclick="speak(\`${m.content.replace(/`/g, "'")}\`)" class="mt-3 p-2 bg-white/50 dark:bg-white/10 rounded-lg hover:scale-110 transition active:scale-95">
                                <i data-lucide="volume-2" class="w-4 h-4"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
            container.scrollTop = container.scrollHeight;
        }

        function renderSidebar() {
            const hist = document.getElementById('chatHistory');
            hist.innerHTML = state.chats.map(c => `
                <div onclick="loadChat('${c.id}')" class="p-4 rounded-2xl cursor-pointer transition-all ${state.currentId === c.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'hover:bg-gray-100 dark:hover:bg-slate-800'}">
                    <p class="text-sm font-bold truncate">${c.title}</p>
                </div>
            `).join('');
        }

        function openSettings() { document.getElementById('settingsModal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
        function saveSettings() {
            state.settings.apiKey = document.getElementById('apiKey').value;
            state.settings.model = document.getElementById('modelName').value || 'google/gemini-2.0-flash-001';
            persist(); closeSettings();
        }
        function toggleDarkMode() {
            state.settings.dark = !state.settings.dark;
            document.documentElement.classList.toggle('dark');
            persist();
        }
    </script>
</body>
</html>
